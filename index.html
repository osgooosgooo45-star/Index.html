<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Намайг уучлаарай... 🥺</title>
    <style>
        body {
            background-color: #ffe6eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .window {
            background-color: #fff0f3;
            border: 5px solid #d97b73;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        .titlebar {
            background-color: #d97b73;
            color: white;
            padding: 8px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .window-buttons {
            display: flex;
            gap: 5px;
        }

        .win-btn {
            width: 12px;
            height: 12px;
            border: 1px solid white;
            display: inline-block;
            font-size: 9px;
            line-height: 10px;
            text-align: center;
        }

        .content {
            padding: 30px 20px;
        }

        h1 {
            color: #bd3b4e;
            font-size: 22px;
            margin-bottom: 20px;
        }

        .emoji-img {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            height: 50px;
            position: relative;
        }

        .btn {
            background-color: #e23b4e;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        #noBtn {
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="titlebar">
            <span>УУЧЛАЛТ</span>
            <div class="window-buttons">
                <span class="win-btn">_</span>
                <span class="win-btn">□</span>
                <span class="win-btn">X</span>
            </div>
        </div>
        
        <div class="content">
            <h1 id="titleText">Намайг уучлаарай, тэгэх үү? 🥺</h1>
            <img id="statusImg" class="emoji-img" src="https://media.tenor.com/0v8Xm4Z4Wp8AAAAM/cute-cat.gif" alt="cat">
            
            <div class="btn-container">
                <button id="yesBtn" class="btn" onclick="sayYes()">ТИЙМ</button>
                <button id="noBtn" class="btn" onmouseover="dodge()" onclick="dodge()">ҮГҮЙ</button>
            </div>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const titleText = document.getElementById('titleText');
        const statusImg = document.getElementById('statusImg');
        
        let yesScale = 1;

        function dodge() {
            const x = Math.random() * 150 - 75;
            const y = Math.random() * 100 - 50;
            
            noBtn.style.transform = `translate(${x}px, ${y}px)`;
            
            yesScale += 0.15;
            yesBtn.style.transform = `scale(${yesScale})`;
        }

        function sayYes() {
            titleText.innerText = "Яаая, баярлалаа! Хайртай шүү ❤️";
            statusImg.src = "https://media.tenor.com/g9vK9NX6v8wAAAAM/mocha-bear-hearts.gif";
            noBtn.style.display = 'none';
            yesBtn.style.transform = 'scale(1)';
            yesBtn.innerText = "Үнсвэл үнсье 😚";
        }
    </script>

</body>
</html>
